<h1 class="page-title">Commission</h1>
<p class="subtitle">Platform commission rate applied to delivered orders</p>

<div class="ss-alert error" *ngIf="errorMsg">{{ errorMsg }}</div>
<div class="ss-alert success" *ngIf="successMsg">{{ successMsg }}</div>

<div class="ss-card" *ngIf="loading">
  <p class="text-muted-2 mb-0"><i class="bi bi-hourglass-split"></i> Loading...</p>
</div>

<div class="ss-card" *ngIf="!loading" style="max-width: 560px;">
  <div class="ss-card-header"><h2>Current rate</h2></div>

  <p class="mb-3">Current commission: <strong>{{ currentPct }}%</strong></p>

  <label class="form-label">New commission (%)</label>
  <input type="number" class="form-control" [(ngModel)]="newPct" min="0" max="100" step="0.5">

  <div class="mt-3">
    <button class="btn btn-primary" (click)="save()" [disabled]="saving">
      <span *ngIf="!saving"><i class="bi bi-save"></i> Save</span>
      <span *ngIf="saving">Saving...</span>
    </button>
  </div>
</div>
