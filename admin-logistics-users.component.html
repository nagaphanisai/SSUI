<h1 class="page-title">Logistics users</h1>
<p class="subtitle">Registered logistics coordinator accounts</p>

<div class="ss-alert error" *ngIf="errorMsg">{{ errorMsg }}</div>

<div class="ss-card">
  <div class="ss-card-header"><h2>All logistics users ({{ users.length }})</h2></div>

  <div *ngIf="loading" class="text-center py-4 text-muted-2">
    <i class="bi bi-hourglass-split"></i> Loading...
  </div>

  <div class="table-wrap" *ngIf="!loading">
    <table class="ss-table">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users">
          <td>#{{ u.userID }}</td>
          <td>{{ u.name }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.phone }}</td>
        </tr>
        <tr *ngIf="users.length === 0">
          <td colspan="4" class="empty-row">No logistics users registered.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
