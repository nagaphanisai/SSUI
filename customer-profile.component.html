<h1 class="page-title">My profile</h1>
<p class="subtitle">Your account information</p>

<div class="ss-card" style="max-width: 560px;">
  <div class="ss-card-header"><h2>Account</h2></div>
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Name</label>
      <div class="profile-value">{{ userName }}</div>
    </div>
    <div class="col-md-6">
      <label class="form-label">User ID</label>
      <div class="profile-value">#{{ userId }}</div>
    </div>
    <div class="col-md-6">
      <label class="form-label">Role</label>
      <div class="profile-value">Customer</div>
    </div>
  </div>
</div>
