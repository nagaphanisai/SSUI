<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <i class="bi bi-bag-check-fill brand-icon"></i>
      <h1>Create an account</h1>
      <p>Join ShopSphere today</p>
    </div>

    <div class="ss-alert error" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="ss-alert success" *ngIf="successMsg">{{ successMsg }}</div>

    <form (ngSubmit)="onRegister()">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" class="form-control" name="phone" [(ngModel)]="phone" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-select" name="role" [(ngModel)]="role">
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="!loading">Create account</span>
        <span *ngIf="loading">Creating...</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Sign in</a>
    </div>
  </div>
</div>
