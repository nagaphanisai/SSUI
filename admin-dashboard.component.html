<h1 class="page-title">Platform overview</h1>
<p class="subtitle">Marketplace-wide KPIs</p>

<div class="row g-3">
  <div class="col-md-3 col-sm-6">
    <div class="stat-tile">
      <div class="stat-icon bg-primary-soft"><i class="bi bi-receipt"></i></div>
      <div>
        <div class="stat-label">Total orders</div>
        <div class="stat-value">{{ totalOrders }}</div>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="stat-tile">
      <div class="stat-icon bg-success-soft"><i class="bi bi-currency-rupee"></i></div>
      <div>
        <div class="stat-label">Total revenue</div>
        <div class="stat-value">₹{{ totalRevenue | number:'1.0-2' }}</div>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="stat-tile">
      <div class="stat-icon bg-warning-soft"><i class="bi bi-arrow-return-left"></i></div>
      <div>
        <div class="stat-label">Refunded</div>
        <div class="stat-value">₹{{ totalRefund | number:'1.0-2' }}</div>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="stat-tile">
      <div class="stat-icon bg-danger-soft"><i class="bi bi-box-seam"></i></div>
      <div>
        <div class="stat-label">Products listed</div>
        <div class="stat-value">{{ totalProducts }}</div>
      </div>
    </div>
  </div>
</div>
