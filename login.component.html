<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <i class="bi bi-bag-check-fill brand-icon"></i>
      <h1>Welcome back</h1>
      <p>Sign in to your ShopSphere account</p>
    </div>

    <div class="ss-alert error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading">Signing in...</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </div>
  </div>
</div>
